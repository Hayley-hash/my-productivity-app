<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>Life OS</h1>
  </header>

  <!-- TOP BUTTON BAR -->
  <div class="button-bar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('canvas')">Canvas</button>
    <button onclick="alert('Settings clicked')">Settings</button>
  </div>

  <!-- CONTENT AREA -->
  <main>

    <!-- HOME -->
    <div id="home" class="page active">

      <img src="home.png" class="hero-image" alt="Home"/>

    </div>

    <!-- CANVAS -->
    <div id="canvas" class="page">

      <h2>Canvas</h2>

      <p>This is your working area.</p>

    </div>

  </main>

  <!-- BOTTOM BUTTON BAR -->
  <div class="bottom-bar">
    <button onclick="alert('Add')">Add</button>
    <button onclick="alert('Save')">Save</button>
    <button onclick="showPage('home')">Back Home</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
