<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('canvas')">Canvas</button>
    <button onclick="showPage('schedule')">Schedule Form</button>
    <button onclick="showPage('halloween')">Halloween Sheet</button>
  </div>

  <!-- ================= HOME ================= -->
  <div id="home" class="page active">
    <div class="hero">
      <h1>Life OS</h1>
      <p>Your personal system dashboard</p>
    </div>
  </div>

  <!-- ================= CANVAS ================= -->
  <div id="canvas" class="page">
    <h2>Canvas</h2>
    <p>This is your workspace area.</p>
  </div>

  <!-- ================= SCHEDULE FORM ================= -->
  <div id="schedule" class="page">

    <h2>Personalise your schedule</h2>
    <p class="subtext">
      Pick your team and fill in your details.
    </p>

    <form class="card">

      <label>Favourite Team</label>
      <select>
        <option>Argentina</option>
        <option>South Africa</option>
        <option>Brazil</option>
        <option>England</option>
      </select>

      <label>Name</label>
      <input type="text" placeholder="Your name">

      <label>Company</label>
      <input type="text" placeholder="Your company">

      <label>Position</label>
      <input type="text" placeholder="Your role">

      <label>Email</label>
      <input type="email" placeholder="you@company.com">

      <label>Phone</label>
      <input type="tel" placeholder="+27 82 000 0000">

      <label>Timezone</label>
      <select>
        <option>SAST (South Africa)</option>
        <option>GMT</option>
        <option>EST</option>
      </select>

      <label class="checkbox">
        <input type="checkbox">
        Email me daily updates
      </label>

      <button type="button" onclick="saveForm()">Save my team</button>

    </form>

  </div>

  <!-- ================= HALLOWEEN SHEET ================= -->
  <div id="halloween" class="page">

    <div class="halloween-header">
      <h1>HALLOWEEN</h1>
      <h2>PARTY</h2>
      <p>Sign Up Sheet</p>

      <div class="meta">
        <span>📅 31 October</span>
        <span>⏰ 6PM - 10PM</span>
      </div>
    </div>

    <div class="table-container">

      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
          </tr>
        </thead>

        <tbody>
          <tr><td>1</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>2</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>3</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>4</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>5</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>6</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>7</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>8</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>9</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>10</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>11</td><td><input></td><td><input></td><td><input></td></tr>
          <tr><td>12</td><td><input></td><td><input></td><td><input></td></tr>
        </tbody>
      </table>

    </div>

    <div class="footer">
      📞 +123-456-7890 | 📍 123 Anywhere St
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
