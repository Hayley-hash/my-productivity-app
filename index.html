<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Life OS</h1>

    <p class="subtext">

    </p>

    <h2>Dashboard</h2>

    <button onclick="show('home')">← Back Home</button>

    <p>This is your dashboard page.</p>

  </div>
</div>

<script src="script.js"></script>

</html>
