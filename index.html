<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP NAV -->
  <div class="topbar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('canvas')">Canvas</button>
  </div>

  <!-- HOME PAGE -->
  <div id="home" class="page active">

    <!-- YOUR CANVA IMAGE (optional but recommended) -->
    <img src="home.png" class="home-image" alt="Home"/>

    <!-- BUTTON ON TOP OF IMAGE -->
    <button class="center-btn" onclick="showPage('canvas')">
      Enter Canvas
    </button>

  </div>

  <!-- CANVAS PAGE -->
  <div id="canvas" class="page">

    <h1>Canvas</h1>

    <div class="card">
      <p>This is your working space.</p>

      <button onclick="alert('Button works!')">
        Test Button
      </button>

      <button onclick="showPage('home')">
        Back Home
      </button>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
