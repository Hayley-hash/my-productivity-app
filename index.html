<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP NAV -->
  <div class="button-bar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('canvas')">Canvas</button>
    <button onclick="showPage('schedule')">Schedule</button>
  </div>

  <!-- ================= HOME ================= -->
  <div id="home" class="page active">
    <h1>Front Page</h1>
    <p>This is your home screen.</p>
  </div>

  <!-- ================= CANVAS ================= -->
  <div id="canvas" class="page">
    <h1>Canvas</h1>
    <p>Your working space goes here.</p>
  </div>

  <!-- ================= SCHEDULE FORM ================= -->
  <div id="schedule" class="page">

    <h2>Personalise your schedule</h2>

    <p class="subtext">
      Pick your team and fill in your details — I may personally reach out by email or phone. No spam, promise.
    </p>

    <form class="form-card">

      <label>Favourite Team</label>
      <select>
        <option>Argentina</option>
        <option>South Africa</option>
        <option>Brazil</option>
        <option>England</option>
      </select>

      <label>Name</label>
      <input type="text" placeholder="Your name">

      <label>Company</label>
      <input type="text" placeholder="Your company">

      <label>Position</label>
      <input type="text" placeholder="Your role">

      <label>Email</label>
      <input type="email" placeholder="you@company.com">

      <label>Phone</label>
      <input type="tel" placeholder="+27 82 000 0000">

      <label>Timezone</label>
      <select>
        <option>SAST (South Africa)</option>
        <option>GMT</option>
        <option>EST</option>
      </select>

      <label class="checkbox">
        <input type="checkbox">
        Email me daily updates
      </label>

      <button type="button" onclick="saveForm()">
        Save my team
      </button>

    </form>

  </div>

  <script src="script.js"></script>
</body>
</html>
