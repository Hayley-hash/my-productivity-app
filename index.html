<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAV -->
  <div class="button-bar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('schedule')">Schedule</button>
  </div>

  <!-- HOME PAGE -->
  <div id="home" class="page active">
    <h1>Life OS</h1>
    <p>Welcome</p>
  </div>

  <!-- SCHEDULE FORM PAGE -->
  <div id="schedule" class="page">

    <h2>Personalise your schedule</h2>

    <p class="subtext">
      Pick your team and fill in your details — I may personally reach out by email or phone. No spam, promise.
    </p>

    <form class="form-card">

      <label>Favourite Team</label>
      <select>
        <option>Argentina</option>
        <option>South Africa</option>
        <option>Brazil</option>
        <option>England</option>
        <option>France</option>
      </select>

      <label>Name</label>
      <input type="text" placeholder="Your name">

      <label>Company</label>
      <input type="text" placeholder="Your company">

      <label>Position</label>
      <input type="text" placeholder="Your role">

      <label>Email</label>
      <input type="email" placeholder="you@company.com">

      <label>Phone (optional)</label>
      <input type="tel" placeholder="+27 82 000 0000">

      <label>Your Timezone</label>
      <select>
        <option>SAST — South Africa (UTC+2)</option>
        <option>GMT — UK</option>
        <option>EST — USA East</option>
        <option>PST — USA West</option>
      </select>

      <p class="info">
        Match times will be shown in your local time alongside SAST
      </p>

      <label class="checkbox">
        <input type="checkbox">
        Email me the daily spoiler-free watch brief each morning
      </label>

      <button type="button" onclick="saveForm()">
        Save my team
      </button>

    </form>

  </div>

  <script src="script.js"></script>
</body>
</html>
