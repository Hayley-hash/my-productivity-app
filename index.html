<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

  <div class="layout">

    <!-- LEFT -->
    <div class="hero">

      <h1>Life OS</h1>

      <p class="subtitle">
        Your daily system for habits, focus, and progress
      </p>

      <div class="cta">
        <p>Welcome back 👋</p>

        <button onclick="show('dashboard')">
          Enter App
        </button>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="panel">

      <div class="tile" onclick="show('journal')">📓 Journal</div>
      <div class="tile" onclick="show('stats')">📊 Stats</div>
      <div class="tile" onclick="show('schedule')">📅 Schedule</div>
      <div class="tile" onclick="show('dashboard')">📌 Dashboard</div>

      <!-- IMAGE -->
      <div class="image-card">
        <img src="home.png" alt="home image">
        <div class="caption">Coming soon: AI insights</div>
      </div>

    </div>

  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <div class="page-inner">
    <h2>Dashboard</h2>
    <button onclick="show('home')">← Back</button>
  </div>
</div>

<!-- JOURNAL -->
<div id="journal" class="page">
  <div class="page-inner">
    <h2>Journal</h2>
    <button onclick="show('home')">← Back</button>
  </div>
</div>

<!-- STATS -->
<div id="stats" class="page">
  <div class="page-inner">
    <h2>Stats</h2>
    <button onclick="show('home')">← Back</button>
  </div>
</div>

<!-- SCHEDULE -->
<div id="schedule" class="page">
  <div class="page-inner">
    <h2>Schedule</h2>
    <button onclick="show('home')">← Back</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
