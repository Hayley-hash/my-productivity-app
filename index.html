<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP NAV -->
  <div class="topbar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('canvas')">Canvas</button>
  </div>

  <!-- HOME PAGE -->
  <div id="home" class="page active">

    <div class="home-wrapper">

      <!-- Canva image background -->
      <img src="home.png" class="home-image" alt="Home"/>

      <!-- REAL clickable button -->
      <button class="overlay-btn" onclick="showPage('canvas')">
        Enter Canvas
      </button>

    </div>

  </div>

  <!-- CANVAS PAGE -->
  <div id="canvas" class="page">

    <h1>Canvas</h1>

    <div class="card">

      <p>This is your working space.</p>

      <button onclick="alert('Button works!')">
        Test Button
      </button>

      <button onclick="showPage('home')">
        Back Home
      </button>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
